<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
    }
    button {
      width: 100%;
      padding: 9px;
      cursor: pointer;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s;
    }
    button.on  { background: #3b82f6; color: white; }
    button.off { background: #e5e7eb; color: #374151; }
    button.on:hover  { background: #2563eb; }
    button.off:hover { background: #d1d5db; }
    #status {
      margin-top: 8px;
      font-size: 11px;
      color: #6b7280;
      text-align: center;
    }
    #hint {
      margin-top: 10px;
      font-size: 10px;
      color: #9ca3af;
      border-top: 1px solid #f3f4f6;
      padding-top: 8px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <button id="toggleBtn" class="off">Enable Inspector</button>
  <div id="status">Inspector is off</div>
  <div id="hint">MCP server must be running on port 7777</div>
  <script src="popup.js"></script>
</body>
</html>
